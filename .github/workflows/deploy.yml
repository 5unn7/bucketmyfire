name: deploy

# Auto-deploy the game to GitHub Pages on every push to main.
#
# Pipeline:  install -> lint (advisory) -> build (tsc gate + vite) -> verify:campaign
# (prove every mission is still completable) -> publish dist/ to gh-pages WITH HISTORY
# (so a bad deploy is one `git revert` + push away) -> post-deploy propagation smoke.
#
# The Supabase leaderboard keys are injected from repo secrets at build time (the anon
# key is public/RLS-gated — safe to ship in the bundle). If any pre-publish gate fails,
# gh-pages is left untouched and the current live site keeps serving.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# The publish step pushes the gh-pages branch with the default token.
permissions:
  contents: write

# Never run two deploys at once; newest push wins.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # full history so the secret scan can see every commit in the push

      # Hard gate: block the deploy if a real credential (Supabase SERVICE_ROLE key, private key,
      # cloud token…) ever lands in the repo. The public, RLS-gated anon key + .env.example
      # placeholders are allowlisted in .gitleaks.toml; the live .env is gitignored. Pinned to a
      # full SHA (supply-chain hardening, like the actions below); Dependabot bumps it.
      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      # Advisory for now (non-blocking): the lint baseline is clean, but it's marked
      # continue-on-error until the full baseline is committed off the in-flight visual
      # branch. Flip to a hard gate (remove continue-on-error) once that lands.
      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build (tsc gate + vite build)
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Crash/error beacon sink (the report-error Edge Function). Public endpoint baked into the
          # bundle; absent -> errors log to the console only. See src/three/telemetry/errorBeacon.ts.
          VITE_ERROR_BEACON_URL: ${{ secrets.VITE_ERROR_BEACON_URL }}

      # Hard gate (pure Node, no browser, ~seconds): the full verification suite —
      #   campaign (mission completability + fire-grid/suppression invariants + factory),
      #   crash   (crash/health physics),
      #   voice   (generative brand-voice invariants),
      #   feel    (flight + bucket control-feel golden trace),
      #   world   (seed -> world determinism; also a co-op prereq), and
      #   ui      (design-token discipline ratchet).
      # Each catches a regression class the type-check can't see. The feel/world/ui baselines are
      # committed; an INTENTIONAL change is re-baselined with `npm run verify:<name> -- --update`.
      - name: Verify sims / feel / world / UI (pure-Node gates)
        run: npm run verify

      # Live render / shader smoke — the ONLY gate that catches GLSL-compile errors (they pass tsc +
      # vite build + verify:campaign and only fail in a real WebGL context). Boots the built dist/ in
      # headless swiftshader Chromium across the title, a mission, and the ?kit gallery, failing on any
      # shader / page / console error. Serves dist/ via `vite preview`, so it needs the Build step above.
      # `--with-deps` pulls the apt libraries Chromium needs on the runner.
      # (If swiftshader ever proves flaky in CI, add `continue-on-error: true` here while it settles —
      #  the verification-systems plan's intent is a HARD gate.)
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Verify render / shaders (headless WebGL)
        run: npm run verify:render

      # History-preserving publish: commits dist/ ON TOP of the existing gh-pages branch
      # (force_orphan defaults false), so a bad deploy can be rolled back with one revert
      # instead of being lost to a force-push. Keeps the CNAME + adds .nojekyll for us.
      # Pinned to a full commit SHA (supply-chain hardening); Dependabot bumps it (see
      # .github/dependabot.yml). The trailing comment tracks which release the SHA is.
      - name: Publish dist/ to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          cname: bucketmyfire.com
          commit_message: "deploy: ${{ github.sha }}"
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # Post-deploy: confirm GitHub Pages is actually serving the NEW build by matching the
      # freshly-built JS asset hash on the live site. Advisory — Pages propagation can lag a
      # couple of minutes, so this warns (not fails) if it hasn't caught up within ~3 min.
      - name: Post-deploy smoke check
        run: |
          asset=$(grep -oE 'assets/index-[A-Za-z0-9_-]+\.js' dist/index.html | head -1)
          echo "Expecting live site to serve: $asset"
          for i in $(seq 1 12); do
            if curl -fsSL https://bucketmyfire.com/ | grep -q "$asset"; then
              echo "OK: live site is serving the new build."
              exit 0
            fi
            echo "Attempt $i/12: not propagated yet, retrying in 15s..."
            sleep 15
          done
          echo "::warning::Live site did not serve the new build within ~3 min (likely slow GitHub Pages propagation; verify manually)."
