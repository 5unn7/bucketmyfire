<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bucket My Fire</title>
    <!-- GitHub Pages serves this for any unknown path. Redirect to the game so a
         mistyped or stale deep-link is never a dead end in the acquisition funnel. -->
    <meta http-equiv="refresh" content="0; url=/" />
    <script>
      location.replace('/');
    </script>
    <style>
      html,
      body {
        margin: 0;
        height: 100vh;
        background: #0e160f;
        color: #f4ead9;
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      a {
        color: #ff7a2f;
      }
    </style>
  </head>
  <body>
    <p>Redirecting to <a href="/">Bucket My Fire</a>…</p>
  </body>
</html>
