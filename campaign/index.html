<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05080b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Campaign — Fly Solo · Bucket My Fire</title>
    <meta
      name="description"
      content="Fly solo in Bucket My Fire: pick your map and your helicopter, then fly a private round over the open world. Defend the towns against live, endless fire. Free in your browser."
    />
    <link rel="canonical" href="https://bucketmyfire.com/campaign/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bucket My Fire" />
    <meta property="og:url" content="https://bucketmyfire.com/campaign/" />
    <meta property="og:title" content="Campaign — Fly Solo · Bucket My Fire" />
    <meta property="og:description" content="Pick your map and your helicopter, then fly a private round over the open world." />
    <meta property="og:image" content="https://bucketmyfire.com/og-image.jpg" />

    <style>
      :root {
        --ember: #ff6a2c; --ember-hi: #ffc24a; --menu: #ffc24a; --fire: #ff7a45; --accent: #67e8ff;
        --text: rgba(255,255,255,0.94); --text-subtle: rgba(255,255,255,0.82); --dim: rgba(255,255,255,0.45); --faint: rgba(255,255,255,0.34);
        --card-bg: #0a0e12; --stroke: rgba(255,255,255,0.12); --warm-stroke: rgba(255,138,110,0.85); --hair: rgba(255,255,255,0.07);
        --shadow-card: 0 8px 30px rgba(0,0,0,0.45); --ember-12: rgba(255,106,44,0.12); --ember-22: rgba(255,106,44,0.22); --ember-35: rgba(255,106,44,0.35); --warm-38: rgba(255,140,60,0.38); --glow-80: rgba(255,140,50,0.8);
        --r-md: 12px; --r-lg: 10px; --r-xl: 18px;
        --font: "Saira Variable", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        --mono: "JetBrains Mono Variable", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        --metal: linear-gradient(160deg, #22262a 0%, #15191d 40%, #0d1013 100%);
        --metal-hi: linear-gradient(160deg, #2c3137 0%, #1a1e23 55%, #101317 100%); --bevel-top: rgba(255,255,255,0.14);
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #05080b; color: var(--text); font-family: var(--font); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; overflow-x: clip; }
      h1, h2, h3 { margin: 0; font-weight: 800; letter-spacing: -0.01em; }
      .fd-scene { position: fixed; inset: 0; z-index: 0; pointer-events: none; background:
        radial-gradient(130% 60% at 50% -8%, rgba(255,106,44,0.2) 0%, rgba(255,106,44,0.05) 30%, transparent 56%),
        radial-gradient(150% 90% at 50% 118%, rgba(255,120,40,0.1) 0%, transparent 52%),
        linear-gradient(180deg, #0a0d10 0%, #0b0e10 42%, #07090b 100%); }
      .fd-app { position: relative; z-index: 2; max-width: 1080px; margin: 0 auto; padding: 0 max(14px, env(safe-area-inset-left)) calc(40px + env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-right)); }
      .fd-page { margin-top: 18px; display: flex; flex-direction: column; gap: 16px; }
      .fd-lead h1 { font-size: clamp(26px, 4.4vw, 42px); line-height: 1.05; color: #fff; max-width: 18ch; text-wrap: balance; }
      .fd-lead p { margin-top: 12px; font-size: clamp(14px, 1.6vw, 16px); line-height: 1.5; color: var(--text-subtle); max-width: 58ch; }
    </style>
  </head>
  <body>
    <noscript>
      <div style="padding: 28px 18px; max-width: 640px; margin: 0 auto; line-height: 1.6">
        <h1 style="color: #ff6a2c">Fly solo</h1>
        <p>Pick your map and your helicopter, then fly a private round over the open world. The picker needs JavaScript. Enable it and reload, or jump into live <a style="color:#ffc24a" href="/?ffa=1">Open Skies</a>.</p>
      </div>
    </noscript>

    <div id="game">
      <div class="fd-scene" aria-hidden="true"></div>
      <div class="fd-app">
        <div id="fd-appbar"></div>
        <main class="fd-page">
          <section class="fd-lead">
            <h1>Fly solo.</h1>
            <p>Pick your ground and your aircraft, then fly a private round over the open world. No ghosts, no shared board. Just you, the fire, and the towns to hold.</p>
          </section>
          <div id="fd-wizard"></div>
        </main>
        <div id="fd-footer"></div>
      </div>
    </div>

    <script type="module" src="/src/campaign/main.ts"></script>
  </body>
</html>
