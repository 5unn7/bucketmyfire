<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#05080b" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Campaign — Fly Solo · Bucket My Fire</title>
    <meta
      name="description"
      content="Fly solo in Bucket My Fire: pick your map and your helicopter, then fly a private round over the open world. Defend the towns against live, endless fire. Free in your browser."
    />
    <link rel="canonical" href="https://bucketmyfire.com/campaign/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bucket My Fire" />
    <meta property="og:url" content="https://bucketmyfire.com/campaign/" />
    <meta property="og:title" content="Campaign — Fly Solo · Bucket My Fire" />
    <meta property="og:description" content="Pick your map and your helicopter, then fly a private round over the open world." />
    <meta property="og:image" content="https://bucketmyfire.com/og-image.jpg" />

    <!-- Critical paint: the cockpit backdrop + the one token the boot scene needs, so the FIRST frame is
         the ember-lit glass scene before src/campaign/main.ts injects the REAL theme.ts tokens + the
         in-game component vocabulary (injectHomeStyles) + the front-door chrome (frontShell). Same
         boot-backdrop pattern index.html / fireline/index.html use. This page SCROLLS (a marketing
         content page), so the body clips only the horizontal axis — never the vertical. -->
    <style>
      :root { --ember: #ff6a2c; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #05080b; color: rgba(255,255,255,0.94);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; overflow-x: clip; }
      #fd-boot { position: fixed; inset: 0; z-index: 0; pointer-events: none; background:
        radial-gradient(130% 60% at 50% -8%, rgba(255,106,44,0.2) 0%, rgba(255,106,44,0.05) 30%, transparent 56%),
        radial-gradient(150% 90% at 50% 118%, rgba(255,120,40,0.1) 0%, transparent 52%),
        linear-gradient(180deg, #0a0d10 0%, #0b0e10 42%, #07090b 100%); }
    </style>
  </head>
  <body>
    <!-- Crawlable / no-JS fallback: the lead + the sitemap. The two-step picker needs JavaScript; live
         Open Skies is one click away without it. -->
    <noscript>
      <div style="position:relative;z-index:1;padding:28px 18px;max-width:680px;margin:0 auto;line-height:1.6">
        <h1 style="color:#ff6a2c">Fly solo.</h1>
        <p>Pick your map and your helicopter, then fly a private round over the open world. The picker
          needs JavaScript; please enable it and reload, or jump into live
          <a style="color:#ffc24a" href="/?ffa=1">Open Skies</a>.</p>
        <p>
          <a style="color:#ffc24a" href="/">Home</a> ·
          <a style="color:#ffc24a" href="/fireline/">The Fireline</a> ·
          <a style="color:#ffc24a" href="/shop/">Shop</a>
        </p>
      </div>
    </noscript>

    <div id="fd-boot" aria-hidden="true"></div>
    <!-- The campaign controller mounts the glass-cockpit picker here (no Three, no game bundle). -->
    <div id="game"></div>

    <script type="module" src="/src/campaign/main.ts"></script>
  </body>
</html>
