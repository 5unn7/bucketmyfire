        <h1 style="color:#ff6a2c">The unsung warriors.</h1>
        <p>The moments that forged Canada's wildfire fight — honouring the crews, pilots, lookouts and
          dispatchers who hold the line. The visual timeline needs JavaScript; the record reads fine without it.</p>
        <ol>
          <li><b>1825</b> — The Great Miramichi Fire devastates northern New Brunswick: one of the largest fires ever recorded in North America.</li>
          <li><b>1916</b> — The Great Matheson Fire in Ontario takes about 223 lives, still Canada's deadliest, and drives the first modern fire-protection laws.</li>
          <li><b>1949</b> — Canada's first smokejumpers, formed in 1947, fly out of La Ronge, parachuting into the boreal to catch fires small.</li>
          <li><b>1950</b> — The Chinchaga firestorm burns ~1.7 million hectares across BC and Alberta, the largest single fire recorded in North America.</li>
          <li><b>1960</b> — The Martin Mars flying boats begin five decades of water bombing over British Columbia.</li>
          <li><b>1967</b> — The Canadair CL-215, the world's first purpose-built water bomber, flies in Quebec.</li>
          <li><b>1982</b> — CIFFC is founded: Canada's agencies agree to fight as one, moving crews and airtankers wherever the fire is worst.</li>
          <li><b>2003</b> — The Okanagan Mountain Park firestorm reaches Kelowna; 27,000 people evacuate and firefighters and soldiers hold the streets.</li>
          <li><b>2016</b> — Fort McMurray: 88,000 people evacuate through the flames and firefighters save most of the city.</li>
          <li><b>2023</b> — The worst season on record; firefighters from a dozen countries fly in to stand beside Canada's own.</li>
          <li><b>2025</b> — The fires return to the prairies and the north: Manitoba and Saskatchewan empty whole communities, and a second extreme season proves 2023 was no outlier.</li>
        </ol>
