    <!-- Critical paint: the cockpit backdrop + the one token the boot scene needs, so the FIRST frame is
         the ember-lit glass scene before src/halloffame/main.ts injects the REAL theme.ts tokens + the
         in-game component vocabulary (injectHomeStyles) + the front-door chrome (frontShell). Same
         boot-backdrop pattern index.html / campaign/index.html use. This page SCROLLS (a marketing
         content page), so the body clips only the horizontal axis — never the vertical. -->
    <style>
      :root { --ember: #ff6a2c; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #05080b; color: rgba(255,255,255,0.94);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; overflow-x: clip; }
      #fd-boot { position: fixed; inset: 0; z-index: 0; pointer-events: none; background:
        radial-gradient(130% 60% at 50% -8%, rgba(255,106,44,0.2) 0%, rgba(255,106,44,0.05) 30%, transparent 56%),
        radial-gradient(150% 90% at 50% 118%, rgba(255,120,40,0.1) 0%, transparent 52%),
        linear-gradient(180deg, #0a0d10 0%, #0b0e10 42%, #07090b 100%); }
    </style>

  <body>
    <!-- Crawlable / no-JS fallback: the full ten-moment roll as plain text, so the tribute reads (and
         indexes) even without JavaScript. The interactive timeline needs JS. -->
    <noscript>
      <div style="position:relative;z-index:1;padding:28px 18px;max-width:680px;margin:0 auto;line-height:1.6">
        <h1 style="color:#ff6a2c">The unsung warriors.</h1>
        <p>Ten moments that forged Canada's wildfire fight — honouring the crews, pilots, lookouts and
          dispatchers who hold the line. The visual timeline needs JavaScript; the record reads fine without it.</p>
        <ol>
          <li><b>1825</b> — The Great Miramichi Fire devastates northern New Brunswick: one of the largest fires ever recorded in North America.</li>
          <li><b>1916</b> — The Great Matheson Fire in Ontario takes 224 lives, still Canada's deadliest, and drives the first modern fire-protection laws.</li>
          <li><b>1949</b> — Canada's first smokejumpers stand up in Saskatchewan, parachuting into the boreal to catch fires small.</li>
          <li><b>1950</b> — The Chinchaga firestorm burns ~1.7 million hectares across BC and Alberta, the largest single fire recorded in North America.</li>
          <li><b>1960</b> — The Martin Mars flying boats begin five decades of water bombing over British Columbia.</li>
          <li><b>1967</b> — The Canadair CL-215, the world's first purpose-built water bomber, flies in Quebec.</li>
          <li><b>1982</b> — CIFFC is founded: Canada's agencies agree to fight as one, moving crews and airtankers wherever the fire is worst.</li>
          <li><b>2003</b> — The Okanagan Mountain Park firestorm reaches Kelowna; 27,000 people evacuate and firefighters and soldiers hold the streets.</li>
          <li><b>2016</b> — Fort McMurray: 88,000 people evacuate through the flames and firefighters save most of the city.</li>
          <li><b>2023</b> — The worst season on record; firefighters from a dozen countries fly in to stand beside Canada's own.</li>
        </ol>

      </div>
    </noscript>
