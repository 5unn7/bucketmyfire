<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Bucket My Fire — helicopter dropping water on a wildfire">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1d2e21" />
      <stop offset="100%" stop-color="#0e160f" />
    </radialGradient>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd27a" />
      <stop offset="55%" stop-color="#ff7a2f" />
      <stop offset="100%" stop-color="#e0431a" />
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" />

  <!-- wildfire -->
  <path
    d="M256 300 C 298 338 312 366 300 398 C 326 384 330 416 304 436 C 286 450 226 450 208 436 C 182 416 186 384 212 398 C 200 366 214 338 256 300 Z"
