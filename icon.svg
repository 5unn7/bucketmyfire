    <rect x="250" y="158" width="12" height="18" />
    <ellipse cx="246" cy="196" rx="62" ry="26" />
    <path d="M300 188 H392 a6 6 0 0 1 6 6 v4 a6 6 0 0 1 -6 6 H300 Z" />
    <rect x="384" y="168" width="10" height="46" rx="5" />
    <path d="M198 214 h96 v6 h-96 z" />
    <rect x="206" y="220" width="8" height="16" rx="3" />
    <rect x="278" y="220" width="8" height="16" rx="3" />
  </g>
  <path d="M188 190 q-14 6 -14 18 q14 6 24 2 z" fill="#7fc8d8" />

  <!-- water drop -->
  <g fill="#5fb6e6">
    <path d="M256 236 c 7 10 11 16 11 22 a11 11 0 0 1 -22 0 c 0 -6 4 -12 11 -22 z" />
    <circle cx="246" cy="280" r="7" opacity="0.85" />
    <circle cx="266" cy="294" r="5" opacity="0.7" />
