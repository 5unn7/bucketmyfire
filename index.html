    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": ["VideoGame", "SoftwareApplication"],
            "name": "Bucket My Fire",
            "alternateName": "Bucket My Fire — Helicopter Wildfire Flight Sim",
            "url": "https://bucketmyfire.com/",
            "image": "https://bucketmyfire.com/og-image.jpg",
            "description": "Fly a helicopter, fill from the lakes, and fight the wildfire before it reaches the town. A real-feel helicopter flight sim, free in your browser.",
            "genre": ["Flight simulator", "Helicopter game", "Wildfire firefighting game"],

            "inLanguage": "en",
            "author": { "@type": "Organization", "name": "Bucket My Fire" },
            "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD", "availability": "https://schema.org/InStock" }

              },
              {
                "@type": "Question",
                "name": "What devices does Bucket My Fire run on?",
                "acceptedAnswer": { "@type": "Answer", "text": "Any modern web browser on phone, tablet, or desktop. It is built mobile-first with touch controls and keyboard support." }

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh; /* fallback for browsers without dynamic-viewport units */
        height: 100dvh; /* track the visible viewport as mobile toolbars show/hide */
        background: #0e160f;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh; /* fallback */
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
      }
      /* Accessibility: honour the OS "reduce motion" setting for all DOM UI (overlays, the
         end-of-mission screen, menus). Near-instant instead of animated; the 3D scene is separate. */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Cold-start splash. Lives in the static HTML so it paints on the FIRST frame —
         before ~1MB of game JS parses — turning the old black-void load into a branded
         beat. Removed by the inline observer below as soon as the renderer canvas mounts. */
      #bmf-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: radial-gradient(120% 90% at 50% 38%, #16241a 0%, #0e160f 70%);
        color: #f4ead9;
        transition: opacity 0.45s ease;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      }
      #bmf-splash.bmf-hide {
        opacity: 0;
        pointer-events: none;
      }
      #bmf-splash .bmf-heli {
        font-size: 54px;
        line-height: 1;
        filter: drop-shadow(0 0 14px rgba(232, 90, 26, 0.55));
        animation: bmf-hover 1.6s ease-in-out infinite;
      }
      #bmf-splash .bmf-word {
        font-weight: 800;
        letter-spacing: 0.16em;
        font-size: 19px;
        text-transform: uppercase;
      }
      #bmf-splash .bmf-word b {
        color: #ff7a2f;
      }
      #bmf-splash .bmf-bar {
        width: 132px;
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      #bmf-splash .bmf-bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 40%;
        border-radius: 3px;
        background: linear-gradient(90deg, #ff7a2f, #ffd27a);
        animation: bmf-slide 1.1s ease-in-out infinite;
      }
      @keyframes bmf-hover {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-7px);
        }
      }
      @keyframes bmf-slide {
        0% {
          transform: translateX(-130%);
        }
        100% {
          transform: translateX(380%);
        }
      }
    </style>
    <script type="module" crossorigin src="./assets/index-CIjjxTTp.js"></script>
  </head>
  <body>
    <!-- Instant-paint cold-start splash (see #bmf-splash in <style>). Static markup so the
         first tap on a shared link shows a branded screen, not a black void, while the game
         JS downloads. The script below removes it the moment the WebGL canvas appears. -->
    <div id="bmf-splash" role="status" aria-label="Loading Bucket My Fire">
      <div class="bmf-heli" aria-hidden="true">🚁</div>
      <div class="bmf-word">Bucket<b>My</b>Fire</div>
      <div class="bmf-bar" aria-hidden="true"></div>
    </div>
    <noscript>
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0e160f;
          color: #f4ead9;
          font-family: system-ui, sans-serif;
          text-align: center;
          padding: 24px;
        "
      >
        <div>
          <h1 style="color: #ff7a2f; margin: 0 0 8px">Bucket My Fire</h1>
          <p style="opacity: 0.85; max-width: 30em">
            This 3D helicopter firefighting game needs JavaScript. Please enable JavaScript and
            reload to fly.
          </p>
        </div>
      </div>
    </noscript>
    <div id="game"></div>
    <script>
      /* Remove the splash once the game signals its FIRST rendered frame ('bmf:ready', fired from the
         TitleScreen / mission render loop — and the fatal-message path — by splashSignal.ts). The old
         trigger fired on canvas-MOUNT, which happens BEFORE the first frame composites, so on a slower
         device the splash could fade onto a black canvas mid shader-compile. Waiting for the first real
         frame hands the splash off to actual pixels. A hard 12s fallback can never strand a visitor on
         the loading screen. No import — just a window event — so this stays in the static HTML. */
      (function () {
        var splash = document.getElementById('bmf-splash');
        if (!splash) return;
        var done = false;
        function hide() {
          if (done) return;
          done = true;
          splash.classList.add('bmf-hide');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 500);
        }
        window.addEventListener('bmf:ready', hide);
        setTimeout(hide, 12000); // safety net
      })();
    </script>

    <!-- Visitor analytics: NONE here on purpose. The domain is proxied through Cloudflare
         (orange-cloud) with Web Analytics enabled, so Cloudflare AUTO-INJECTS the privacy-first
         beacon at the edge — no cookies, no consent banner, no token in this file. Adding a manual
         <script> beacon here would double-count every pageview. If the site is ever moved off the
         Cloudflare proxy, re-add the manual beacon (dash.cloudflare.com → Web Analytics → token). -->
  </body>
</html>
