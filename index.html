<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#05080b" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Bucket My Fire — Live Wildfire Tracker &amp; Helicopter Fire-Fight Sim</title>

    <meta
      name="description"
      content="The only live wildfire tracker you can fly into — agency-reported fires, area burned, and fire weather from CIFFC and CWFIS across Canada, plus a helicopter you fly into the fight. Free in your browser."
    />
    <link rel="canonical" href="https://bucketmyfire.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bucket My Fire" />
    <meta property="og:url" content="https://bucketmyfire.com/" />
    <meta property="og:title" content="Bucket My Fire — Live Wildfire Tracker &amp; Helicopter Fire-Fight Sim" />
    <meta
      property="og:description"
      content="See real wildfire across Canada, live — then fly a helicopter into the fight. Real CIFFC + CWFIS data, free in your browser."
    />
    <meta property="og:image" content="https://bucketmyfire.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A helicopter with a slung water bucket flying over a burning northern forest." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bucket My Fire — Live Wildfire Tracker &amp; Helicopter Fire-Fight Sim" />
    <meta name="twitter:description" content="See real wildfire across Canada, live — then fly a helicopter into the fight. Real CIFFC + CWFIS data, free in your browser." />
    <meta name="twitter:image" content="https://bucketmyfire.com/og-image.jpg" />

    <!-- SEO + AEO structured data (WebSite + VideoGame + FAQPage JSON-LD) is injected as a STATIC tag at
         build time by the bmf-structured-data plugin in vite.config.ts. -->

    <!-- Critical paint: the cockpit backdrop + token fallbacks, so the FIRST frame is the ember-lit glass
         scene before src/hub.ts injects the REAL theme.ts tokens + the in-game home stylesheet (the same
         components the hub uses: dossier sheen, cut cards, .shopbanner specular, squared badges). -->
    <style>
      :root { --ember: #ff6a2c; }
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #05080b; color: rgba(255,255,255,0.94);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-font-smoothing: antialiased; overflow-x: clip; }
      /* The front door is a CONTENT page — it scrolls. The game re-locks the viewport on entry. */
      body.bmf-playing { overflow: hidden; height: 100dvh; touch-action: none; overscroll-behavior: none; }
      body.bmf-playing #game { position: fixed; inset: 0; width: 100vw; height: 100dvh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
      body.bmf-playing canvas { display: block; }
      #fd-boot { position: fixed; inset: 0; z-index: 0; background:
        radial-gradient(130% 60% at 50% -8%, rgba(255,106,44,0.2) 0%, rgba(255,106,44,0.05) 30%, transparent 56%),
        radial-gradient(150% 90% at 50% 118%, rgba(255,120,40,0.1) 0%, transparent 52%),
        linear-gradient(180deg, #0a0d10 0%, #0b0e10 42%, #07090b 100%); }
    </style>
  </head>
  <body>
    <!-- Crawlable / no-JS fallback: the positioning claim + the real authorities. The interactive
         glass-cockpit hub (and the 3D game) need JavaScript. -->
    <noscript>
      <div style="position:relative;z-index:1;padding:28px 18px;max-width:680px;margin:0 auto;line-height:1.6">
        <h1 style="color:#ff6a2c">Fight the fire.</h1>
        <p>Watch real wildfire across Canada from CIFFC and CWFIS, then fly a helicopter into the fight. The live
          fire map and the 3D game both need JavaScript; please enable it and reload.</p>
        <p>
          <a style="color:#ffc24a" href="/campaign/">Campaign</a> ·
          <a style="color:#ffc24a" href="/fireline/">The Fireline</a> ·
          <a style="color:#ffc24a" href="https://shop.bucketmyfire.com/">Shop</a>
        </p>
        <p>For authoritative wildfire information, see
          <a style="color:#ffc24a" href="https://ciffc.net/">CIFFC</a>,
          <a style="color:#ffc24a" href="https://cwfis.cfs.nrcan.gc.ca/">CWFIS</a>, and
          <a style="color:#ffc24a" href="https://www.getprepared.gc.ca/">Get Prepared Canada</a>.
        </p>
      </div>
    </noscript>

    <div id="fd-boot" aria-hidden="true"></div>
    <!-- The hub mounts the glass-cockpit home here (and lazy-loads the 3D game only on a play link). -->
    <div id="game"></div>

    <script type="module" src="/src/hub.ts"></script>

    <!-- Visitor analytics: NONE here on purpose — Cloudflare Web Analytics auto-injects the privacy-first
         beacon at the edge; a manual beacon would double-count. -->
  </body>
</html>
