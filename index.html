<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand favicon: the bucket-drop flame mark (public/icon.svg), an SVG so the tab icon stays
         crisp at any size. Home-screen installs use raster PNGs (apple-touch-icon.png + the manifest
         icon-192/512) because iOS/Android ignore SVG there. All rasterized from the one icon.svg. -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1b2a1f" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- iOS/Android home-screen icons need raster PNG (Safari ignores SVG apple-touch-icon). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Bucket My Fire — Helicopter Wildfire Flight Sim</title>

    <!-- SEO + social share. Open Graph / Twitter cards make the link unfurl with a
         title, blurb, and preview image on X / Discord / iMessage / Slack — which is
         how shared links actually pull in visitors. og:image MUST be an absolute URL. -->
    <meta
      name="description"
      content="Fly a helicopter, fill from the lakes, and fight the fire before it reaches the town. A real-feel helicopter flight sim, free in your browser."
    />
    <link rel="canonical" href="https://bucketmyfire.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bucket My Fire" />
    <meta property="og:url" content="https://bucketmyfire.com/" />
    <meta property="og:title" content="Bucket My Fire — Helicopter Wildfire Flight Sim" />
    <meta
      property="og:description"
      content="Fly a helicopter, fill from the lakes, and fight the fire before it reaches the town. A real-feel flight sim, free in your browser."
    />
    <meta property="og:image" content="https://bucketmyfire.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A helicopter with a slung water bucket flying over a burning forest."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bucket My Fire — Helicopter Wildfire Flight Sim" />
    <meta
      name="twitter:description"
      content="Fly a helicopter, fill from the lakes, and fight the fire before it reaches the town. A real-feel flight sim, free in your browser."
    />
    <meta name="twitter:image" content="https://bucketmyfire.com/og-image.jpg" />

    <!-- SEO + AEO structured data (VideoGame + FAQPage JSON-LD) is injected as a STATIC tag at
         build time by the bmf-structured-data plugin in vite.config.ts. It is kept out of this file
         because an inline ld+json script here desyncs Vite's HTML inline-proxy (it dropped the splash
         style proxy and broke the build). -->
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100vh; /* fallback for browsers without dynamic-viewport units */
        height: 100dvh; /* track the visible viewport as mobile toolbars show/hide */
        background: #0e160f;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        font-family: system-ui, sans-serif;
      }
      #game {
        width: 100vw;
        height: 100vh; /* fallback */
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas {
        display: block;
      }
      /* Accessibility: honour the OS "reduce motion" setting for all DOM UI (overlays, the
         end-of-mission screen, menus). Near-instant instead of animated; the 3D scene is separate. */
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
          scroll-behavior: auto !important;
        }
      }

      /* Cold-start splash CSS (the #bmf-splash full-screen wrapper + the .bmf-spin ember loader) is
         INJECTED here at serve+build time by the `bmf-splash` Vite plugin (vite.config.ts), from the
         ONE shared source src/three/ui/spinner.ts — the same module the in-app LoadingOverlay imports,
         so the two loaders can never drift. It is appended AFTER this style block, so its
         reduced-motion override (.bmf-spin) still out-specifies the global `*` kill above. The splash
         markup is injected at the start of the document body with the same source. NOTE: do not write a
         literal body/style/head start-tag in these comments — the plugin's injector regex-matches the
         first such tag and would inject into the comment. */
    </style>
  </head>
  <body>
    <!-- The instant-paint cold-start splash (#bmf-splash) is injected as the first child of the
         document body by the `bmf-splash` Vite plugin (vite.config.ts) from src/three/ui/spinner.ts, so
         the first tap on a shared link shows the branded ember-rise loader — the icon mark, not a black
         void — while the game JS downloads. The script below removes it once the game signals its first
         rendered frame ('bmf:ready'), with a 12s safety fallback. -->
    <noscript>
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0e160f;
          color: #f4ead9;
          font-family: system-ui, sans-serif;
          text-align: center;
          padding: 24px;
        "
      >
        <div>
          <h1 style="color: #ff7a2f; margin: 0 0 8px">Bucket My Fire</h1>
          <p style="opacity: 0.85; max-width: 30em">
            This 3D helicopter firefighting game needs JavaScript. Please enable JavaScript and
            reload to fly.
          </p>
        </div>
      </div>
    </noscript>
    <div id="game"></div>
    <script>
      /* Remove the splash once the game signals its FIRST rendered frame ('bmf:ready', fired from the
         TitleScreen / mission render loop — the home hub — and the fatal-message path — by
         splashSignal.ts). The old trigger fired on canvas-MOUNT, which happens BEFORE the first frame
         composites, so on a slower device the splash could fade onto a black canvas mid shader-compile.
         Waiting for the first real frame hands the splash off to actual pixels. A hard 12s fallback can
         never strand a visitor on the loading screen. No import — just a window event — so this stays
         in the static HTML. */
      (function () {
        var splash = document.getElementById('bmf-splash');
        if (!splash) return;

        /* The ember-rise loader hero is pure inline SVG + CSS (injected by the bmf-splash plugin from
           src/three/ui/spinner.ts) — it paints and animates with no JS, so this script only handles
           tearing the splash down. Remove it once the game signals its FIRST rendered frame
           ('bmf:ready'). Waiting for the first real frame hands the splash off to actual pixels, not a
           black canvas mid shader-compile. A hard 12s fallback can never strand a visitor here. */
        /* Minimum on-screen time. The ember-rise loader animates up from opacity 0 over ~1.7s; if
           the splash were torn down the instant the first frame paints (sub-second on a warm cache /
           the lightweight title route), the embers would never visibly rise and the glow would barely
           pulse — the brand moment would flash by unseen. So hold it at least MIN_MS even when the
           game is ready sooner. The 12s safety net still force-hides regardless. */
        var MIN_MS = 1100;
        var t0 = window.performance && performance.now ? performance.now() : Date.now();
        var done = false;
        var pending = 0;
        function doHide() {
          if (done) return;
          done = true;
          if (pending) clearTimeout(pending);
          splash.classList.add('bmf-hide');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 550);
        }
        function requestHide() {
          if (done || pending) return;
          var now = window.performance && performance.now ? performance.now() : Date.now();
          var left = MIN_MS - (now - t0);
          if (left <= 0) doHide();
          else pending = setTimeout(doHide, left);
        }
        window.addEventListener('bmf:ready', requestHide);
        setTimeout(doHide, 12000); // safety net — force hide no matter what
      })();
    </script>
    <script type="module" src="/src/three/main.ts"></script>

    <!-- Visitor analytics: NONE here on purpose. The domain is proxied through Cloudflare
         (orange-cloud) with Web Analytics enabled, so Cloudflare AUTO-INJECTS the privacy-first
         beacon at the edge — no cookies, no consent banner, no token in this file. Adding a manual
         <script> beacon here would double-count every pageview. If the site is ever moved off the
         Cloudflare proxy, re-add the manual beacon (dash.cloudflare.com → Web Analytics → token). -->
  </body>
</html>
