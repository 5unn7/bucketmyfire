    <!-- Instant-paint cold-start splash (see #bmf-splash in <style>). Static markup so the
         first tap on a shared link shows a branded screen — an animated ASCII flame — not a black
         void, while the game JS downloads. The script below removes it once the game signals its
         first rendered frame ('bmf:ready'), with a 12s safety fallback. -->
    <div id="bmf-splash" role="status" aria-label="Loading Bucket My Fire">
      <pre id="bmf-flame" aria-hidden="true"></pre>

    <script>
      /* Remove the splash once the game signals its FIRST rendered frame ('bmf:ready', fired from the
         TitleScreen / mission render loop — and the fatal-message path — by splashSignal.ts). The old
         trigger fired on canvas-MOUNT, which happens BEFORE the first frame composites, so on a slower
         device the splash could fade onto a black canvas mid shader-compile. Waiting for the first real
         frame hands the splash off to actual pixels. A hard 12s fallback can never strand a visitor on
         the loading screen. No import — just a window event — so this stays in the static HTML. */
      (function () {
        var splash = document.getElementById('bmf-splash');
        if (!splash) return;

        /* Animate the ASCII flame hero. Three frames share a bounding box (the tip leans and the
           body pulses) so it flickers in place like a real fire. Frames are set here rather than in
           the markup so the <pre> source stays clean; the inline script runs on parse, so the first
           frame paints effectively immediately. Held steady when the OS asks for reduced motion. */
        var flame = document.getElementById('bmf-flame');
        var reduce = false;
        try {
          reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        } catch (e) {}
        var FRAMES = [
          '      (\n     )@(\n    (@@@)\n   )@@@@@(\n   (@@@@@)\n   )@@@@@(\n    (@@@)\n     )#(\n    \'###\'',
          '     (\n    (@)\n   )@@@(\n  (@@@@@)\n  )@@@@@@(\n  (@@@@@)\n   )@@@(\n     )#(\n    \'-#-\'',
          "       (\n      (@)\n     (@@@)\n    )@@@@(\n    (@@@@)\n    )@@@(\n     (@)\n     )#(\n    '###'",
        ];
        var flameTimer = 0;
        if (flame) {
          flame.textContent = FRAMES[0];
          if (!reduce) {
            var fi = 0;
            flameTimer = setInterval(function () {
              fi = (fi + 1) % FRAMES.length;
              flame.textContent = FRAMES[fi];
            }, 150);
          }
        }

        /* Remove the splash once the game signals its FIRST rendered frame ('bmf:ready', fired from
           the TitleScreen / mission render loop — and the fatal-message path — by splashSignal.ts).
           Waiting for the first real frame hands the splash off to actual pixels, not a black canvas
           mid shader-compile. A hard 12s fallback can never strand a visitor on the loading screen. */
        var done = false;
        function hide() {
          if (done) return;
          done = true;
          if (flameTimer) clearInterval(flameTimer);
          splash.classList.add('bmf-hide');
          setTimeout(function () {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 550);
        }
        window.addEventListener('bmf:ready', hide);
        setTimeout(hide, 12000); // safety net
      })();
    </script>
