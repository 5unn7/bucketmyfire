<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>bucketmyfire — New Pilot</title>
<link rel="stylesheet" href="kit.css">
<style>
  .onb-mark{ display:flex; justify-content:center; margin:4px 0 18px; }
  .onb-mark .brand__mark{ width:64px; height:64px; }
  .legal{ text-align:center; margin-top:16px; }
  .legal a{ color:var(--faint); text-decoration:none; border-bottom:1px solid transparent; transition:color .14s, border-color .14s; }
  .legal a:hover{ color:var(--ember-hi); border-bottom-color:var(--warm-stroke); }
</style>
</head>
<body data-screen="onboarding" data-rail="false">
<main class="app app--norail">
  <div class="app__pad">

    <!-- ============ APPBAR ============ -->
    <div class="appbar rise d1">
      <button class="back" data-nav="title" aria-label="Back to title">
        <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div>
        <div class="ttl">New Pilot</div>
        <div class="sub">Callsign · Roster</div>
      </div>
      <span class="spacer"></span>
    </div>

    <!-- ============ HERO ============ -->
    <div class="onb-mark rise d1">
      <div class="brand__mark lg" aria-label="bucketmyfire">
        <svg class="flame" viewBox="0 0 149.7 184.72"><polygon points="149.7 134.09 74.92 184.72 0 134.31 .57 108.82 74.83 158.71 148.67 108.67 149.7 134.09"/><path d="M73.06,58.25c-18.59,21.04-34.35,33.63-22.6,64.65-21.97-11.26-29.05-37.71-17.05-59.08C46.45,40.59,68.12,28.39,69.08,0c16.8,18.38,20.62,39.42,3.98,58.25Z"/><path d="M78.83,107.06c-5.97,5.58-8.3,13.06-8.78,21.51-10.73-8.26-13.63-23.66-5.17-35.08,13.99-18.88,30.5-27.51,32.95-51.73,22.16,26.58,26.3,62.23-2.1,82.13,1.38-11.22,2.02-20.02-3.9-28.97l-12.99,12.14Z"/></svg>
      </div>
    </div>

    <div class="eyebrow rise d2">First in</div>
    <h1 class="h-screen rise d2" style="margin-top:6px;">Name your callsign</h1>
    <p class="muted rise d2" style="margin-top:10px;font-size:var(--fs-body);line-height:1.5;max-width:36ch;">
      Every pilot on the line goes by a callsign. Pick yours — it rides on the radio and on the leaderboard.
    </p>

    <!-- ============ FORM ============ -->
    <form class="card card--warm card--cut rise d3" style="margin-top:18px;" onsubmit="return false">
      <div class="field">
        <label for="callsign">Callsign</label>
        <div class="inputwrap">
          <svg class="flame" viewBox="0 0 149.7 184.72" style="width:18px;height:18px;flex:0 0 auto;"><path d="M73.06,58.25c-18.59,21.04-34.35,33.63-22.6,64.65-21.97-11.26-29.05-37.71-17.05-59.08C46.45,40.59,68.12,28.39,69.08,0c16.8,18.38,20.62,39.42,3.98,58.25Z"/><path d="M78.83,107.06c-5.97,5.58-8.3,13.06-8.78,21.51-10.73-8.26-13.63-23.66-5.17-35.08,13.99-18.88,30.5-27.51,32.95-51.73,22.16,26.58,26.3,62.23-2.1,82.13,1.38-11.22,2.02-20.02-3.9-28.97l-12.99,12.14Z"/></svg>
          <input id="callsign" name="callsign" type="text" placeholder="e.g. DUSTOFF" maxlength="24" autocomplete="off" autocapitalize="characters" spellcheck="false" required>
        </div>
        <div class="hint">2–24 characters · letters and numbers</div>
      </div>

      <div class="field" style="margin-bottom:0;">
        <label for="email">Email <span class="opt">— optional</span></label>
        <div class="inputwrap">
          <svg viewBox="0 0 24 24" style="width:18px;height:18px;flex:0 0 auto;fill:none;stroke:var(--ember-hi);stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <input id="email" name="email" type="email" placeholder="you@example.com" autocomplete="email" spellcheck="false">
        </div>
        <div class="hint">Save your progress to the cloud and post scores.</div>
      </div>
    </form>

    <!-- ============ CTA ============ -->
    <button class="btn primary block lg rise d4" style="margin-top:18px;" data-nav="home">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Enter the fight
    </button>

    <div class="legal faint rise d4" style="font-size:var(--fs-meta);">
      By flying you accept the <a href="#" data-nav="settings">Privacy</a> · <a href="#" data-nav="settings">Terms</a>
    </div>

  </div>
</main>
<script src="kit.js"></script>
</body>
</html>
