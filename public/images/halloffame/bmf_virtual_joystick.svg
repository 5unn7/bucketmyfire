<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Bucketmyfire Virtual Joystick</title>
  <desc>Transparent SVG virtual joystick asset with frosted-glass aviation HUD styling.</desc>
  <defs>
    <radialGradient id="baseGlass" cx="50%" cy="45%" r="58%">
      <stop offset="0%" stop-color="#17353A" stop-opacity="0.78"/>
      <stop offset="55%" stop-color="#08171A" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#020607" stop-opacity="0.92"/>
    </radialGradient>
    <radialGradient id="thumbGlass" cx="42%" cy="34%" r="68%">
      <stop offset="0%" stop-color="#BEEAF0" stop-opacity="0.58"/>
      <stop offset="35%" stop-color="#476971" stop-opacity="0.76"/>
      <stop offset="100%" stop-color="#081113" stop-opacity="0.98"/>
    </radialGradient>
    <linearGradient id="cyanStroke" x1="88" y1="64" x2="424" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9F6FF" stop-opacity="0.96"/>
      <stop offset="0.5" stop-color="#5BD7E8" stop-opacity="0.52"/>
      <stop offset="1" stop-color="#B9FBFF" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="dimStroke" x1="109" y1="87" x2="401" y2="426" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A9F6FF" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#5BD7E8" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="softShadow" x="16" y="16" width="480" height="480" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
    <filter id="cyanGlow" x="0" y="0" width="512" height="512" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.88 0 0 0 0 0.96 0 0 0 0.65 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow" x="92" y="92" width="328" height="328" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#7DEFFF" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000000" flood-opacity="0.42"/>
    </filter>
  </defs>

  <!-- Base -->
  <g filter="url(#softShadow)">
    <circle cx="256" cy="256" r="198" fill="url(#baseGlass)"/>
    <circle cx="256" cy="256" r="197" stroke="#001014" stroke-opacity="0.8" stroke-width="2"/>
    <circle cx="256" cy="256" r="192" stroke="url(#cyanStroke)" stroke-opacity="0.42" stroke-width="2"/>
  </g>

  <!-- Rotor/compass inspired rings -->
  <g filter="url(#cyanGlow)">
    <circle cx="256" cy="256" r="174" stroke="url(#dimStroke)" stroke-width="1.4" stroke-dasharray="2 13"/>
    <circle cx="256" cy="256" r="149" stroke="#8CEEFF" stroke-opacity="0.18" stroke-width="1"/>
    <circle cx="256" cy="256" r="112" stroke="#8CEEFF" stroke-opacity="0.16" stroke-width="1"/>

    <!-- Long calibration marks -->
    <path d="M256 63V86" stroke="#8CEEFF" stroke-opacity="0.64" stroke-width="3" stroke-linecap="round"/>
    <path d="M256 426V449" stroke="#8CEEFF" stroke-opacity="0.64" stroke-width="3" stroke-linecap="round"/>
    <path d="M63 256H86" stroke="#8CEEFF" stroke-opacity="0.64" stroke-width="3" stroke-linecap="round"/>
    <path d="M426 256H449" stroke="#8CEEFF" stroke-opacity="0.64" stroke-width="3" stroke-linecap="round"/>

    <!-- Small diagonal calibration marks -->
    <path d="M119.1 119.1L133.9 133.9" stroke="#8CEEFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
    <path d="M378.1 378.1L392.9 392.9" stroke="#8CEEFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
    <path d="M392.9 119.1L378.1 133.9" stroke="#8CEEFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
    <path d="M133.9 378.1L119.1 392.9" stroke="#8CEEFF" stroke-opacity="0.28" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Directional chevrons -->
  <g filter="url(#cyanGlow)" stroke="#D7FCFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" opacity="0.92">
    <path d="M221 153L256 120L291 153"/>
    <path d="M221 359L256 392L291 359"/>
    <path d="M153 221L120 256L153 291"/>
    <path d="M359 221L392 256L359 291"/>
  </g>

  <!-- Inner movement socket -->
  <g filter="url(#innerGlow)">
    <circle cx="256" cy="256" r="92" fill="#041114" fill-opacity="0.82"/>
    <circle cx="256" cy="256" r="91" stroke="#15343A" stroke-opacity="0.9" stroke-width="2"/>
    <circle cx="256" cy="256" r="81" stroke="url(#cyanStroke)" stroke-opacity="0.62" stroke-width="2"/>
  </g>

  <!-- Thumb pad -->
  <g filter="url(#innerGlow)">
    <circle cx="256" cy="256" r="65" fill="url(#thumbGlass)"/>
    <circle cx="256" cy="256" r="65" stroke="#C9FBFF" stroke-opacity="0.64" stroke-width="2"/>
    <circle cx="256" cy="256" r="43" fill="#071315" fill-opacity="0.26"/>
    <ellipse cx="232" cy="220" rx="42" ry="25" fill="#E7FFFF" opacity="0.12"/>
  </g>

  <!-- Fine highlight arcs -->
  <g stroke="#B7F8FF" stroke-width="2" stroke-linecap="round" opacity="0.52" filter="url(#cyanGlow)">
    <path d="M116.5 189.5C139.2 135.4 192.6 97.5 255 97.5"/>
    <path d="M397.2 321.4C374.8 375.9 321.2 414.5 258.5 414.5"/>
  </g>

  <!-- Subtle bottom depth crescent -->
  <path d="M92 313C126 401 211 452 300 436C371 423 426 371 442 306C405 377 333 425 255 425C177 425 109 381 92 313Z" fill="#000000" fill-opacity="0.16"/>
</svg>
