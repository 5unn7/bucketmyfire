<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0605" />
    <title>BMF Gear — Wear the fight.</title>

    <!-- The merch store moved to its own property (shop.bucketmyfire.com — a headless
         Medusa + Next.js storefront). This page is retired to a redirect so old links,
         bookmarks, and the pre-launch waitlist URL all forward to the real store. -->
    <link rel="canonical" href="https://shop.bucketmyfire.com/" />
    <meta http-equiv="refresh" content="0; url=https://shop.bucketmyfire.com/" />
    <meta name="robots" content="noindex, follow" />

    <style>
      :root {
        --ember: #ff6a2c;
        --gold: #ffc24a;
        --bg0: #0a0605;
        --ink: rgba(255, 255, 255, 0.94);
        --dim: rgba(255, 255, 255, 0.56);
        --font: 'Saira Variable', ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 16px;
        font-family: var(--font);
        color: var(--ink);
        background: radial-gradient(120% 90% at 50% 30%, #1a0f0a, var(--bg0));
        text-align: center;
        padding: 24px;
      }
      .eyebrow {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--gold);
      }
      h1 {
        margin: 0;
        font-size: clamp(28px, 8vw, 40px);
        font-weight: 900;
      }
      p {
        margin: 0;
        color: var(--dim);
        font-size: 15px;
      }
      a.go {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 6px;
        padding: 13px 22px;
        border-radius: 11px;
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        text-decoration: none;
        color: #3a2406;
        background: linear-gradient(180deg, #ffd45e 0%, #efaa2b 100%);
        box-shadow: 0 8px 24px rgba(239, 170, 43, 0.32);
      }
    </style>
  </head>
  <body>
    <div class="eyebrow">BMF Gear</div>
    <h1>Wear the fight.</h1>
    <p>Taking you to the shop&hellip;</p>
    <a class="go" href="https://shop.bucketmyfire.com/">Continue to the shop &rarr;</a>
    <script>
      // Belt-and-suspenders to the <meta refresh>: replace (no history entry) so Back returns
      // to wherever the visitor came from, not into this redirect.
      location.replace('https://shop.bucketmyfire.com/')
    </script>
  </body>
</html>
