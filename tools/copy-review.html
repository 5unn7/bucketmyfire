<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bucket My Fire — Copy Review</title>
<style>
  :root{
    --bg:#0e1014; --bg2:#14171d; --panel:#181c23; --panel2:#1e232b;
    --line:#2a313c; --ink:#e8edf3; --mut:#8b96a5; --mut2:#5e6b7a;
    --ember:#ff6b35; --emberHi:#ff8c4a; --emberDim:#3a241a;
    --cyan:#4fd0e0; --ok:#5fcf80; --warn:#ffcf5a;
    --chg:#ffb347; --chgBg:#2a2114;
    --rad:10px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:var(--cyan)}

  /* ---- top bar ---- */
  header{
    position:sticky; top:0; z-index:40;
    background:linear-gradient(180deg,#15181e 0%, #12151b 100%);
    border-bottom:1px solid var(--line);
    padding:12px 18px 10px;
  }
  .brand{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap}
  .brand h1{font-size:17px; margin:0; letter-spacing:.04em}
  .brand h1 b{color:var(--ember)}
  .brand .sub{color:var(--mut); font-size:12.5px}
  .toolbar{
    display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:10px;
  }
  .search{
    flex:1 1 280px; min-width:200px; position:relative;
  }
  .search input{
    width:100%; padding:9px 12px 9px 34px; border-radius:var(--rad);
    background:var(--bg2); border:1px solid var(--line); color:var(--ink); font-size:13.5px;
  }
  .search input:focus{outline:none; border-color:var(--ember)}
  .search::before{content:"⌕"; position:absolute; left:11px; top:7px; color:var(--mut2); font-size:16px}
  button.btn{
    padding:8px 12px; border-radius:var(--rad); border:1px solid var(--line);
    background:var(--panel2); color:var(--ink); cursor:pointer; font-size:13px; white-space:nowrap;
  }
  button.btn:hover{border-color:var(--mut2)}
  button.btn.primary{background:var(--ember); border-color:var(--ember); color:#1a0f08; font-weight:600}
  button.btn.primary:hover{background:var(--emberHi); border-color:var(--emberHi)}
  button.btn.ghost{background:transparent}
  button.btn:disabled{opacity:.4; cursor:default}
  .countpill{
    font-size:12px; color:var(--mut); padding:5px 9px; border:1px solid var(--line);
    border-radius:999px; white-space:nowrap;
  }
  .countpill b{color:var(--chg)}

  /* ---- layout ---- */
  .wrap{display:flex; gap:0; align-items:flex-start}
  nav.toc{
    position:sticky; top:108px; align-self:flex-start;
    width:248px; flex:0 0 248px; max-height:calc(100vh - 120px); overflow:auto;
    padding:14px 8px 40px 16px; border-right:1px solid var(--line);
  }
  nav.toc .grp{font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--mut2); margin:14px 6px 5px}
  nav.toc a{
    display:flex; justify-content:space-between; gap:8px; align-items:center;
    text-decoration:none; color:var(--mut); font-size:12.5px; padding:4px 8px; border-radius:7px;
  }
  nav.toc a:hover{background:var(--panel); color:var(--ink)}
  nav.toc a .n{color:var(--mut2); font-size:11px}
  nav.toc a .chg{color:var(--chg); font-size:11px; font-weight:600}
  main{flex:1 1 auto; min-width:0; padding:18px 26px 120px}

  section.sec{margin:0 0 26px; scroll-margin-top:120px}
  section.sec > h2{
    font-size:15px; margin:0 0 2px; display:flex; align-items:center; gap:9px; letter-spacing:.01em;
  }
  section.sec > h2 .dot{width:8px; height:8px; border-radius:2px; background:var(--ember); flex:0 0 auto}
  section.sec > h2 .file{font-size:11px; color:var(--mut2); font-weight:400; font-family:ui-monospace,Menlo,Consolas,monospace}
  section.sec .blurb{color:var(--mut); font-size:12.5px; margin:1px 0 12px}

  .row{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--rad);
    padding:10px 12px; margin:0 0 9px;
  }
  .row.changed{border-color:var(--chg); background:linear-gradient(180deg,var(--chgBg),var(--panel) 60%)}
  .row .meta{display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-bottom:7px}
  .row .ctx{font-size:12px; color:var(--ink); font-weight:600}
  .row .loc{font-size:10.5px; color:var(--mut2); font-family:ui-monospace,Menlo,Consolas,monospace}
  .row .note{font-size:11px; color:var(--cyan); opacity:.85}
  .row .tag{font-size:10px; color:var(--chg); border:1px solid var(--chg); border-radius:999px; padding:1px 7px; font-weight:600}
  .row .revert{margin-left:auto; font-size:11px; color:var(--mut); background:none; border:none; cursor:pointer; padding:2px 4px}
  .row .revert:hover{color:var(--ember); text-decoration:underline}
  .row textarea{
    width:100%; resize:none; overflow:hidden; min-height:34px;
    background:var(--bg2); border:1px solid var(--line); border-radius:8px; color:var(--ink);
    font:13.5px/1.5 inherit; padding:7px 10px;
  }
  .row textarea:focus{outline:none; border-color:var(--ember)}
  .row.changed textarea{border-color:#3d3520}
  .row .orig{
    display:none; font-size:11.5px; color:var(--mut2); margin-top:6px; padding-left:2px;
    border-left:2px solid var(--line); padding:3px 0 3px 9px; white-space:pre-wrap;
    font-family:ui-monospace,Menlo,Consolas,monospace;
  }
  .row.changed .orig{display:block}
  .row .orig b{color:var(--mut); font-weight:600; font-family:inherit}

  .empty{color:var(--mut2); font-size:13px; padding:40px; text-align:center}
  .hidden{display:none !important}

  /* export modal */
  .modal{
    position:fixed; inset:0; z-index:80; background:rgba(6,8,11,.72);
    display:none; align-items:center; justify-content:center; padding:24px;
  }
  .modal.open{display:flex}
  .modal .box{
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    width:min(760px,100%); max-height:86vh; display:flex; flex-direction:column; overflow:hidden;
  }
  .modal .box h3{margin:0; padding:14px 18px; border-bottom:1px solid var(--line); font-size:14px}
  .modal .box .body{padding:14px 18px; overflow:auto}
  .modal textarea{
    width:100%; min-height:320px; background:var(--bg2); border:1px solid var(--line);
    border-radius:8px; color:var(--ink); font:12px/1.5 ui-monospace,Menlo,Consolas,monospace; padding:10px;
  }
  .modal .foot{padding:12px 18px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end}
  .modal .hint{color:var(--mut); font-size:12px; margin:0 0 10px}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ember); color:#1a0f08; padding:9px 16px; border-radius:999px; font-weight:600;
    font-size:13px; z-index:90; opacity:0; transition:opacity .2s; pointer-events:none;
  }
  .toast.show{opacity:1}

  @media (max-width:820px){
    nav.toc{display:none}
    main{padding:14px 14px 120px}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Bucket My <b>Fire</b> — Copy Review</h1>
    <span class="sub">Every player-facing string, in one place. Edit inline → <b style="color:var(--ember)">Save to repo</b> → tell Claude “apply copy edits”.</span>
  </div>
  <div class="toolbar">
    <div class="search"><input id="q" type="search" placeholder="Search copy, context, or file…" autocomplete="off" /></div>
    <span class="countpill" id="pill">— strings</span>
    <button class="btn ghost" id="onlyChanged">Only changed</button>
    <button class="btn primary" id="saveRepoBtn" title="Write edits into the repo as tools/copy-changes.json, then tell Claude to apply">💾 Save to repo</button>
    <button class="btn" id="copyBtn">Copy changes</button>
    <button class="btn" id="exportBtn">Export changes</button>
    <button class="btn ghost" id="snapshotBtn">Full snapshot</button>
    <button class="btn ghost" id="resetBtn">Reset edits</button>
  </div>
</header>

<div class="wrap">
  <nav class="toc" id="toc"></nav>
  <main id="main"></main>
</div>

<div class="modal" id="modal">
  <div class="box">
    <h3 id="modalTitle">Export</h3>
    <div class="body">
      <p class="hint" id="modalHint"></p>
      <textarea id="modalText" readonly></textarea>
    </div>
    <div class="foot">
      <button class="btn" id="modalCopy">Copy to clipboard</button>
      <button class="btn" id="modalDownload">Download .json</button>
      <button class="btn ghost" id="modalClose">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

{"title":"Mission 1 — First Light","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: first-light · Dawn over Weyakwin. The trainer mission.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":36,"text":"First Light"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":38,"text":"Dawn over Weyakwin. Learn to fly, and save the cabins."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":37,"text":"Your first flight out of Weyakwin. Fill from the lake and knock down the ground fire creeping at the cabins. Calm air — learn the aircraft."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":39,"text":"Welcome aboard, Water-1. Bring the rotors up and ease her off the deck. A slow ground fire is working out of the bush toward the cabins at Weyakwin, on the lake’s south shore. Fly low over open water to fill the bucket, then pour it on the flames. Winds are light — a good morning to get the feel of her. Remember: a fire only dies when you put water on it."},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":52,"text":"Defend Weyakwin"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":54,"text":"Water-1, Dispatch — rotors are up, you're cleared to lift. Three spots creeping at the Weyakwin cabins. Fill from the lake and knock them down — take your time."},
 {"ctx":"Radio — reflare","file":"src/three/maps/saskatchewan/missions.ts","line":56,"text":"It jumped the line — one more lick by the cabins. Get back on it."},
 {"ctx":"Radio — good start","file":"src/three/maps/saskatchewan/missions.ts","line":58,"text":"That's the way, Water-1 — clean drop. Keep filling and hitting them."},
 {"ctx":"Radio — treeline","file":"src/three/maps/saskatchewan/missions.ts","line":59,"text":"Fire's into the treeline by Weyakwin — mind those cabins."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":60,"text":"All out, cabins standing. Textbook, Water-1. Weyakwin owes you a coffee."}
]},

{"title":"Mission 2 — Low Hover Drill","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: hover-training · Precision low-hover certification across five clearings.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":67,"text":"Low Hover Drill"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":69,"text":"Three feet off the ground. Don't touch. Five clearings."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":68,"text":"Precision low-hover certification. Fly to five marked clearings on land and hold a steady hover three feet off the ground for twelve seconds at each — skids off the dirt, NOT touching, NOT climbing."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":70,"text":"No bucket today, Water-1 — fundamentals. A precision low hover is the hardest thing you can do with this aircraft: you're three feet from the rotor wash hitting dirt, ground effect pushing back, every control input amplified. We've marked five clearings across the sector — La Ronge first, then the four corners: Buffalo Narrows, Southend, Denare Beach, Cypress Hills. Fly to each, descend to three feet, and HOLD it for twelve seconds. Don't touch the ground. Don't drift. Don't climb. When the timer clears, move on."},
 {"ctx":"Objective — deliver","file":"src/three/maps/saskatchewan/missions.ts","line":91,"text":"Complete all five low-hover drills"},
 {"ctx":"Zone — La Ronge","file":"src/three/maps/saskatchewan/missions.ts","line":85,"text":"La Ronge Clearing"},
 {"ctx":"Zone — Buffalo Narrows","file":"src/three/maps/saskatchewan/missions.ts","line":86,"text":"Buffalo Narrows Clearing"},
 {"ctx":"Zone — Southend","file":"src/three/maps/saskatchewan/missions.ts","line":87,"text":"Southend Clearing"},
 {"ctx":"Zone — Denare Beach","file":"src/three/maps/saskatchewan/missions.ts","line":88,"text":"Denare Beach Clearing"},
 {"ctx":"Zone — Cypress Hills","file":"src/three/maps/saskatchewan/missions.ts","line":89,"text":"Cypress Hills Clearing"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":94,"text":"Water-1, low-hover certification today. Fly to each marked clearing, descend to three feet, and hold it for twelve seconds without touching. La Ronge first — the four corners after."},
 {"ctx":"Radio — leg 1","file":"src/three/maps/saskatchewan/missions.ts","line":95,"text":"Twelve seconds clean — good hold. Northwest to Buffalo Narrows next."},
 {"ctx":"Radio — leg 2","file":"src/three/maps/saskatchewan/missions.ts","line":96,"text":"Buffalo Narrows. Across the top to Southend in the northeast."},
 {"ctx":"Radio — leg 3","file":"src/three/maps/saskatchewan/missions.ts","line":97,"text":"Southend. Swing east to Denare Beach."},
 {"ctx":"Radio — leg 4","file":"src/three/maps/saskatchewan/missions.ts","line":98,"text":"One left — the run southwest to Cypress Hills."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":99,"text":"Five clean holds across the sector. That low hover will save a life, Water-1. Certified."}
]},

{"title":"Mission 3 — Hold the Line","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: hold-the-line · Endure a wind-driven front off Denare Beach until crews land.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":106,"text":"Hold the Line"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":108,"text":"Screaming wind. Hold the front off Denare Beach till the crews land."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":107,"text":"Heavy wind, extreme risk. Ground crews are 3 minutes out — keep this fire off Denare Beach until they arrive. Your valve bucket splits a load across passes."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":109,"text":"Ground crews are three minutes out. Until they land, you are the only thing between an advancing front and the town of Denare Beach, on the shore of Amisk Lake. Hold the line — the wind is screaming and the fire keeps flanking you, so triage which head threatens a home and split your valve load across passes. You cannot win by clearing it; you win by ENDURING until the crews are down."},
 {"ctx":"Objective — survive","file":"src/three/maps/saskatchewan/missions.ts","line":124,"text":"Hold for 3:00"},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":125,"text":"Defend Denare Beach"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":127,"text":"Water-1, crews are 3 minutes out. Keep the fire off Denare Beach until they're on the ground. It's blowing hard — hold the line."},
 {"ctx":"Radio — flank 1","file":"src/three/maps/saskatchewan/missions.ts","line":128,"text":"Flare-up on the north flank — get on it before it runs."},
 {"ctx":"Radio — holding","file":"src/three/maps/saskatchewan/missions.ts","line":130,"text":"You're holding her, Water-1. Halfway there — crews are closing."},
 {"ctx":"Radio — flank 2","file":"src/three/maps/saskatchewan/missions.ts","line":131,"text":"She's pushing hard on the south side — don't let her reach the homes!"},
 {"ctx":"Radio — fence","file":"src/three/maps/saskatchewan/missions.ts","line":133,"text":"Fire's at the fenceline — push it back NOW!"},
 {"ctx":"Radio — inbound","file":"src/three/maps/saskatchewan/missions.ts","line":134,"text":"Crews inbound — thirty seconds. Hold what you have."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":135,"text":"Crews are on the ground — they've got it. You held the line, Water-1."}
]},

{"title":"Mission 4 — Backburn","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: backburn · Lay a helitorch backburn to starve a head off Missinipe.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":151,"text":"Backburn"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":153,"text":"Fight fire with fire. Lay a backburn and starve the head before it reaches town."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":152,"text":"You can't out-bomb this head — it's too big, running downwind on Missinipe. Stop it with fire: fly the torch and lay a backburn along the control line, starving the wildfire before it reaches the homes. Fly the markers low, IGNITE held."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":154,"text":"Water won't hold this one, Water-1 — the head's too big and the wind's behind it, driving it onto Missinipe. So we starve it. You're rigged with the helitorch today: fly the marked control line between the fire and the town and lay a backburn — a deliberate fire that burns the fuel out ahead of the wildfire. When the head arrives, it hits your black and lies down with nothing left to eat. Fly each marker LOW with IGNITE held to light it; walk the whole line before the head gets there. This is the tactic the ground crews respect most — fire against fire. Don't leave a gap."},
 {"ctx":"Objective — backburn","file":"src/three/maps/saskatchewan/missions.ts","line":172,"text":"Lay the backburn line (5 segments)"},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":173,"text":"Keep the head off Missinipe"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":175,"text":"Water-1, you can't out-bomb this one — she's too big and the wind's behind her. We starve her instead. You're on the helitorch: fly the control line and lay a backburn. Light each marker low, IGNITE held. Walk the whole line before she gets there."},
 {"ctx":"Radio — catching","file":"src/three/maps/saskatchewan/missions.ts","line":176,"text":"Your line's catching — the backfire's drawing toward the head, just like it should. Keep walking it, don't leave a gap."},
 {"ctx":"Radio — testing","file":"src/three/maps/saskatchewan/missions.ts","line":178,"text":"The head's at your line — if there's a gap she'll punch through. Close it, NOW!"},
 {"ctx":"Radio — drawing","file":"src/three/maps/saskatchewan/missions.ts","line":179,"text":"Wind's steady on the line and she's drawing your backfire in. Hold your nerve and finish the burn."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":180,"text":"The head ran straight into your black and lay down — nothing left to burn. You stopped a wildfire with fire, Water-1. That's the one the crews tell stories about."}
]},

{"title":"Mission 5 — Doorstep","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: doorstep · Beat fires off Stanley Mission and sling out cut-off families.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":187,"text":"Doorstep"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":189,"text":"Fire at Stanley Mission's doors. Beat it back, lift the families clear."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":188,"text":"The fire is at the doorsteps of Stanley Mission. Fight the heads near town — and when families are cut off, re-rig to the sling and pull them out while ember spot-fires light behind you."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":190,"text":"The fire is at the doorsteps of Stanley Mission and Missinipe. Open on the heads near the homes with the bucket and keep them off the cabins. Dispatch is hearing of families getting cut off as the front passes — when that call comes, set down at base, re-rig to the crew sling, and pull them out before the flames reach the last door. Embers are throwing spot fires behind you, and the heavy wind should ease as the front goes through."},
 {"ctx":"Objective — extinguishCount","file":"src/three/maps/saskatchewan/missions.ts","line":215,"text":"Kill the fires at the doorsteps"},
 {"ctx":"Zone — base","file":"src/three/maps/saskatchewan/missions.ts","line":214,"text":"Base"},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":217,"text":"Beat the fire to the doors"},
 {"ctx":"Fail label — rescue","file":"src/three/maps/saskatchewan/missions.ts","line":218,"text":"Get the cut-off families out"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":221,"text":"Water-1, the fire's on the doorsteps at Stanley Mission. Work the heads by the cabins — and stand by, we may need you to pull people out."},
 {"ctx":"Radio — cut-off","file":"src/three/maps/saskatchewan/missions.ts","line":228,"text":"Three families are cut off as the front passes! Re-rig to the sling at base and get them out — fast."},
 {"ctx":"Pop-up objective — evacuate","file":"src/three/maps/saskatchewan/missions.ts","line":229,"text":"Evacuate the cut-off families"},
 {"ctx":"Pop-up zone — Family 1","file":"src/three/maps/saskatchewan/missions.ts","line":230,"text":"Family 1"},
 {"ctx":"Pop-up zone — Family 2","file":"src/three/maps/saskatchewan/missions.ts","line":231,"text":"Family 2"},
 {"ctx":"Pop-up zone — Family 3","file":"src/three/maps/saskatchewan/missions.ts","line":232,"text":"Family 3"},
 {"ctx":"Radio — embers","file":"src/three/maps/saskatchewan/missions.ts","line":236,"text":"Embers just lit the brush behind you — spot fires by the cabins."},
 {"ctx":"Radio — front passes","file":"src/three/maps/saskatchewan/missions.ts","line":238,"text":"Front's passing — wind's backing off. That's your window for the last door."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":239,"text":"Fires down and every family's out. You beat the fire to the last door, Water-1. Lives saved today."}
]},

{"title":"Mission 6 — Three Towns","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: three-towns · Two fronts merge and run at Buffalo Narrows.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":246,"text":"Three Towns"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":248,"text":"Two fronts merge into one monster, running at Buffalo Narrows."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":247,"text":"Two fires near Beauval and Île-à-la-Crosse grow toward each other, MERGE, and the joined front runs at Buffalo Narrows. Triage all three — and pull out two families that get cut off."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":249,"text":"Two separate fires, two towns — Beauval and Île-à-la-Crosse — and a strong, steady wind carrying them toward each other. They will MERGE into one front, and that front is pointed straight at Buffalo Narrows downwind. You cannot be everywhere: triage the two original heads, then chase the merged monster off Buffalo Narrows. When families get cut off mid-fight, re-rig to the sling and bring them out. This is the widest fight yet."},
 {"ctx":"Zone — base","file":"src/three/maps/saskatchewan/missions.ts","line":274,"text":"Base"},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":277,"text":"Hold all three towns"},
 {"ctx":"Fail label — rescue","file":"src/three/maps/saskatchewan/missions.ts","line":278,"text":"Get the trapped families out"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":281,"text":"Water-1, two fronts and a wind that's joining them up. Triage Beauval and Île-à-la-Crosse — and watch Buffalo Narrows downwind."},
 {"ctx":"Radio — merge","file":"src/three/maps/saskatchewan/missions.ts","line":283,"text":"The two fires have joined — one front now, and it's running straight at Buffalo Narrows."},
 {"ctx":"Radio — families","file":"src/three/maps/saskatchewan/missions.ts","line":289,"text":"Two families are trapped between the fronts! Re-rig and pull them out when you can."},
 {"ctx":"Pop-up objective — evacuate","file":"src/three/maps/saskatchewan/missions.ts","line":290,"text":"Rescue the trapped families"},
 {"ctx":"Pop-up zone — Family 1","file":"src/three/maps/saskatchewan/missions.ts","line":291,"text":"Family 1"},
 {"ctx":"Pop-up zone — Family 2","file":"src/three/maps/saskatchewan/missions.ts","line":292,"text":"Family 2"},
 {"ctx":"Radio — gust","file":"src/three/maps/saskatchewan/missions.ts","line":295,"text":"Wind gusting — the merged head is running. Stay ahead of it."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":296,"text":"All three towns standing, families out, fire dead. One helicopter against three towns — extraordinary, Water-1."}
]},

{"title":"Mission 7 — After Burn","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: after-burn · Mop up the black off Denare Beach before holdovers re-flare.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":312,"text":"After Burn"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":314,"text":"The fire isn't out when the flames die. Mop up the black before it wakes."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":313,"text":"The front has passed Denare Beach — now the long work. Grid the black for smouldering hotspots and drown every one before a holdover re-flares out of the duff and runs again. Finite fuel: patrol smart, refuel at base."},
 {"ctx":"Intel (pre-flight)","file":"src/three/maps/saskatchewan/missions.ts","line":315,"text":"You held the line at Denare Beach, Water-1 — but a fire is never out when the flames die down. The front has passed and left a smoking black, and somewhere in it root systems and stumps are still burning underground. Those are holdovers: leave one and the noon wind will fan it back into a running fire on the town. Grid the burn scar, find every hotspot, and drown it cold. Use the valve to split a load across several spots — you don’t need a full dump on a smouldering stump. Watch your fuel and refuel at base; mop-up is a long patrol. Don’t call it out until every last one is dead."},
 {"ctx":"Fail label — protect","file":"src/three/maps/saskatchewan/missions.ts","line":338,"text":"Keep the black off Denare Beach"},
 {"ctx":"Radio — start","file":"src/three/maps/saskatchewan/missions.ts","line":342,"text":"Water-1, the front's through Denare Beach — but she's not out. The black's full of hotspots smouldering in the duff. Grid it and drown every one before the wind comes up. Mind your fuel out there."},
 {"ctx":"Radio — sleeper 1","file":"src/three/maps/saskatchewan/missions.ts","line":344,"text":"Smoke just came up on the east edge — a stump woke back up. They hide for hours, this is the job."},
 {"ctx":"Radio — gridding","file":"src/three/maps/saskatchewan/missions.ts","line":346,"text":"Good grid, Water-1 — you're walking it cold. Keep working the black."},
 {"ctx":"Radio — sleeper 2","file":"src/three/maps/saskatchewan/missions.ts","line":348,"text":"Holdover by the cabins — root fire carried it back under the line. Get on it before it re-establishes."},
 {"ctx":"Radio — reflare","file":"src/three/maps/saskatchewan/missions.ts","line":350,"text":"One's coming back up at the treeline — don't let her re-take that ground!"},
 {"ctx":"Radio — noon wind","file":"src/three/maps/saskatchewan/missions.ts","line":352,"text":"Wind's lifting as the day heats up — that's what wakes the sleepers. Last hotspots now, Water-1."},
 {"ctx":"Radio — fuel","file":"src/three/maps/saskatchewan/missions.ts","line":353,"text":"Fuel's getting low — top up at base, then back on the patrol. Don't strand yourself out in the black."},
 {"ctx":"Radio — won","file":"src/three/maps/saskatchewan/missions.ts","line":354,"text":"Every hotspot cold — she's declared out, Water-1. That's how fires are really won: not when the flames drop, but when the last ember dies. Textbook mop-up."}
]},

{"title":"Mission 8 — Everything at Once","file":"src/three/maps/saskatchewan/missions.ts","blurb":"id: everything-at-once · The finale: a Class-F head on La Ronge, the depot threatened.","entries":[
 {"ctx":"Title","file":"src/three/maps/saskatchewan/missions.ts","line":361,"text":"Everything at Once"},
 {"ctx":"Tagline (card)","file":"src/three/maps/saskatchewan/missions.ts","line":363,"text":"The finale. A firestorm on La Ronge, the depot burning, the tank near dry."},
 {"ctx":"Briefing","file":"src/three/maps/saskatchewan/missions.ts","line":362,"text":"The finale. A Class-F head on La Ronge, the depot itself threatened, a re-flaring monster, a finite tank — and a family to pull out. Everything you have learned, at once."},

<script>
(function(){
  "use strict";
  var STORE_KEY = "bmf-copy-edits-v1";
  var data = JSON.parse(document.getElementById("copyData").textContent);
  var edits = {};
  try { edits = JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); } catch(e){ edits = {}; }

  // stable id from file + line + original text (so localStorage survives reloads / data reorders)
  function hash(s){ var h=5381,i=s.length; while(i){ h=(h*33)^s.charCodeAt(--i); } return (h>>>0).toString(36); }
  function idFor(e){ return hash(e.file + "|" + e.line + "|" + e.text); }

  var main = document.getElementById("main");
  var toc  = document.getElementById("toc");
  var pill = document.getElementById("pill");
  var qbox = document.getElementById("q");
  var onlyChangedBtn = document.getElementById("onlyChanged");
  var toast = document.getElementById("toast");

  var total = 0, allEntries = [];
  var onlyChanged = false;
  var fileHandle = null; // persisted FileSystemFileHandle for one-click "Save to repo"

  function slug(t){ return t.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,""); }

  // ---- build DOM ----
  var tocGroups = {};
  data.sections.forEach(function(sec, si){
    var secId = "s"+si+"-"+slug(sec.title);
    var sEl = document.createElement("section");
    sEl.className = "sec";
    sEl.id = secId;
    sEl.dataset.sec = si;

    var h2 = document.createElement("h2");
    var dot = document.createElement("span"); dot.className="dot"; h2.appendChild(dot);
    h2.appendChild(document.createTextNode(sec.title));
    var fEl = document.createElement("span"); fEl.className="file"; fEl.textContent = sec.file || "";
    h2.appendChild(fEl);
    sEl.appendChild(h2);

    if(sec.blurb){ var b=document.createElement("div"); b.className="blurb"; b.textContent=sec.blurb; sEl.appendChild(b); }

    sec.entries.forEach(function(e){
      total++;
      var id = idFor(e);
      e._id = id; e._sec = si;
      allEntries.push(e);

      var row = document.createElement("div");
      row.className = "row";
      row.dataset.id = id;
      row.dataset.search = ((e.ctx||"")+" "+(e.text||"")+" "+(e.file||"")+" "+(e.note||"")).toLowerCase();

      var meta = document.createElement("div"); meta.className="meta";
      var ctx = document.createElement("span"); ctx.className="ctx"; ctx.textContent=e.ctx; meta.appendChild(ctx);
      var loc = document.createElement("span"); loc.className="loc"; loc.textContent=e.file+":"+e.line; meta.appendChild(loc);
      if(e.note){ var note=document.createElement("span"); note.className="note"; note.textContent=e.note; meta.appendChild(note); }
      var tag = document.createElement("span"); tag.className="tag"; tag.textContent="edited"; tag.style.display="none"; meta.appendChild(tag);
      var rev = document.createElement("button"); rev.className="revert"; rev.textContent="↺ revert"; rev.style.display="none"; meta.appendChild(rev);
      row.appendChild(meta);

      var ta = document.createElement("textarea");
      ta.spellcheck = true;
      ta.value = (id in edits) ? edits[id] : e.text;
      row.appendChild(ta);

      var orig = document.createElement("div"); orig.className="orig";
      orig.innerHTML = "<b>original:</b> ";
      orig.appendChild(document.createTextNode(e.text));
      row.appendChild(orig);

      function autosize(){ ta.style.height="auto"; ta.style.height=(ta.scrollHeight+2)+"px"; }
      function refresh(){
        var changed = ta.value !== e.text;
        row.classList.toggle("changed", changed);
        tag.style.display = changed ? "" : "none";
        rev.style.display = changed ? "" : "none";
        if(changed){ edits[id] = ta.value; } else { delete edits[id]; }
      }
      ta.addEventListener("input", function(){ autosize(); refresh(); persist(); updateCounts(); });
      rev.addEventListener("click", function(){ ta.value=e.text; autosize(); refresh(); persist(); updateCounts(); });

      // initial state
      requestAnimationFrame(autosize);
      if((id in edits) && edits[id]!==e.text){ row.classList.add("changed"); tag.style.display=""; rev.style.display=""; }

      sEl.appendChild(row);
    });

    main.appendChild(sEl);

    // TOC entry — group by top-level prefix before the em-dash
    var grpName = sec.title.split(" — ")[0];
    if(!tocGroups[grpName]){
      var g=document.createElement("div"); g.className="grp"; g.textContent=grpName; toc.appendChild(g);
      tocGroups[grpName]=true;
    }
    var a=document.createElement("a"); a.href="#"+secId;
    var label=document.createElement("span"); label.textContent = sec.title.indexOf(" — ")>=0 ? sec.title.split(" — ").slice(1).join(" — ") : sec.title;
    var n=document.createElement("span"); n.className="n"; n.textContent=sec.entries.length; n.dataset.sec=si;
    a.appendChild(label); a.appendChild(n);
    a.addEventListener("click", function(ev){ ev.preventDefault(); document.getElementById(secId).scrollIntoView({behavior:"smooth"}); });
    toc.appendChild(a);
  });

  function persist(){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(edits)); }catch(e){} }

  function changedCount(){ var c=0; for(var k in edits){ if(edits.hasOwnProperty(k)) c++; } return c; }

  function updateCounts(){
    var c = changedCount();
    pill.innerHTML = total + " strings · <b>" + c + "</b> edited";
    // per-section changed badges in TOC
    var perSec = {};
    allEntries.forEach(function(e){ if(e._id in edits){ perSec[e._sec]=(perSec[e._sec]||0)+1; } });
    toc.querySelectorAll("a .n").forEach(function(n){
      var si = n.dataset.sec;
      var base = data.sections[si].entries.length;
      if(perSec[si]){ n.className="chg"; n.textContent = perSec[si]+"/"+base; }
      else { n.className="n"; n.textContent = base; }
    });
  }

  // ---- search + only-changed filter ----
  function applyFilter(){
    var q = qbox.value.trim().toLowerCase();
    document.querySelectorAll("section.sec").forEach(function(secEl){
      var anyVisible = false;
      secEl.querySelectorAll(".row").forEach(function(row){
        var matchQ = !q || row.dataset.search.indexOf(q) >= 0 || (row.querySelector("textarea").value.toLowerCase().indexOf(q)>=0);
        var matchC = !onlyChanged || row.classList.contains("changed");
        var show = matchQ && matchC;
        row.classList.toggle("hidden", !show);
        if(show) anyVisible = true;
      });
      secEl.classList.toggle("hidden", !anyVisible);
    });
  }
  qbox.addEventListener("input", applyFilter);
  onlyChangedBtn.addEventListener("click", function(){
    onlyChanged = !onlyChanged;
    onlyChangedBtn.classList.toggle("primary", onlyChanged);
    onlyChangedBtn.textContent = onlyChanged ? "Showing changed" : "Only changed";
    applyFilter();
  });

  // ---- toast ----
  var toastT;
  function showToast(msg){
    toast.textContent = msg; toast.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(function(){ toast.classList.remove("show"); }, 1600);
  }

  // ---- export ----
  function changesPayload(){
    var out = [];
    allEntries.forEach(function(e){
      if(e._id in edits && edits[e._id] !== e.text){
        out.push({ file:e.file, line:e.line, context:e.ctx, original:e.text, edited:edits[e._id] });
      }
    });
    return out;
  }
  function snapshotPayload(){
    return data.sections.map(function(sec){
      return { section: sec.title, file: sec.file, entries: sec.entries.map(function(e){
        return { context:e.ctx, file:e.file, line:e.line, text: (e._id in edits ? edits[e._id] : e.text), changed: (e._id in edits && edits[e._id]!==e.text) };
      })};
    });
  }

  var modal = document.getElementById("modal");
  var modalText = document.getElementById("modalText");
  var modalTitle = document.getElementById("modalTitle");
  var modalHint = document.getElementById("modalHint");
  var modalDownloadName = "bmf-copy-changes.json";

  function openModal(title, hint, obj, filename){
    modalTitle.textContent = title;
    modalHint.textContent = hint;
    modalText.value = JSON.stringify(obj, null, 2);
    modalDownloadName = filename;
    modal.classList.add("open");
  }
  document.getElementById("modalClose").addEventListener("click", function(){ modal.classList.remove("open"); });
  modal.addEventListener("click", function(ev){ if(ev.target===modal) modal.classList.remove("open"); });
  document.getElementById("modalCopy").addEventListener("click", function(){
    modalText.select(); copyText(modalText.value); showToast("Copied to clipboard");
  });
  document.getElementById("modalDownload").addEventListener("click", function(){ download(modalDownloadName, modalText.value); });

  function copyText(t){
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).catch(function(){}); }
    else { try{ document.execCommand("copy"); }catch(e){} }
  }
  function download(name, text){
    var blob = new Blob([text], {type:"application/json"});
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 100);
  }

  document.getElementById("exportBtn").addEventListener("click", function(){
    var ch = changesPayload();
    if(!ch.length){ showToast("No edits yet"); return; }
    openModal("Export changes ("+ch.length+")",
      "Only edited strings. Hand this back to Claude to apply to source (matched by file + original text).",
      ch, "bmf-copy-changes.json");
  });

  // ---- one-click "Save to repo": write edits to a file Claude can read ----
  function idbOpen(){ return new Promise(function(res,rej){
    var r = indexedDB.open("bmf-copy-review", 1);
    r.onupgradeneeded = function(){ r.result.createObjectStore("kv"); };
    r.onsuccess = function(){ res(r.result); };
    r.onerror   = function(){ rej(r.error); };
  }); }
  function idbGet(k){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var t = db.transaction("kv","readonly").objectStore("kv").get(k);
    t.onsuccess = function(){ res(t.result); }; t.onerror = function(){ rej(t.error); };
  }); }); }
  function idbSet(k,v){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var t = db.transaction("kv","readwrite").objectStore("kv").put(v,k);
    t.onsuccess = function(){ res(); }; t.onerror = function(){ rej(t.error); };
  }); }); }

  function ensurePerm(handle){
    if(!handle.queryPermission) return Promise.resolve(true);
    return handle.queryPermission({mode:"readwrite"}).then(function(p){
      if(p==="granted") return true;
      return handle.requestPermission({mode:"readwrite"}).then(function(r){ return r==="granted"; });
    });
  }
  function writeVia(handle, text){
    return handle.createWritable().then(function(w){ return w.write(text).then(function(){ return w.close(); }); });
  }

  function saveToRepo(){
    var ch = changesPayload();
    if(!ch.length){ showToast("No edits yet"); return; }
    var json = JSON.stringify(ch, null, 2);
    var ok = ch.length + " change" + (ch.length===1?"":"s") + " saved → tell Claude: “apply copy edits”";

    if(window.showSaveFilePicker){
      var chain = fileHandle ? Promise.resolve(fileHandle) : idbGet("handle").catch(function(){ return null; });
      chain.then(function(h){
        fileHandle = h || null;
        if(fileHandle){
          return ensurePerm(fileHandle).then(function(granted){ if(!granted) fileHandle=null; });
        }
      }).then(function(){
        if(fileHandle) return fileHandle;
        return window.showSaveFilePicker({
          suggestedName: "copy-changes.json",
          types: [{ description:"JSON", accept:{ "application/json":[".json"] } }]
        }).then(function(h){ fileHandle = h; return idbSet("handle", h).catch(function(){}).then(function(){ return h; }); });
      }).then(function(h){
        if(!h) return;
        return writeVia(h, json).then(function(){ showToast(ok); });
      }).catch(function(e){
        if(e && e.name === "AbortError") return;          // user cancelled the picker
        fileHandle = null;                                 // stale/blocked handle → fall back
        download("copy-changes.json", json);
        showToast("Saved to Downloads → move into the repo, tell Claude: “apply copy edits”");
      });
    } else {
      download("copy-changes.json", json);
      showToast("Saved to Downloads → move into the repo, tell Claude: “apply copy edits”");
    }
  }
  document.getElementById("saveRepoBtn").addEventListener("click", saveToRepo);
  document.getElementById("copyBtn").addEventListener("click", function(){
    var ch = changesPayload();
    if(!ch.length){ showToast("No edits yet"); return; }
    copyText(JSON.stringify(ch, null, 2));
    showToast(ch.length + " change" + (ch.length===1?"":"s") + " copied");
  });
  document.getElementById("snapshotBtn").addEventListener("click", function(){
    openModal("Full snapshot",
      "Every string with its current value (edits applied). A complete copy deck.",
      snapshotPayload(), "bmf-copy-full.json");
  });
  document.getElementById("resetBtn").addEventListener("click", function(){
    var c = changedCount();
    if(!c){ showToast("Nothing to reset"); return; }
    if(!confirm("Discard all "+c+" edit"+(c===1?"":"s")+"? This can't be undone.")) return;
    edits = {}; persist();
    document.querySelectorAll(".row").forEach(function(row){
      var ta = row.querySelector("textarea");
      var e = allEntries.filter(function(x){return x._id===row.dataset.id;})[0];
      if(e){ ta.value = e.text; ta.style.height="auto"; ta.style.height=(ta.scrollHeight+2)+"px"; }
      row.classList.remove("changed");
      row.querySelector(".tag").style.display="none";
      row.querySelector(".revert").style.display="none";
    });
    updateCounts(); applyFilter(); showToast("Edits reset");
  });

  // keyboard: '/' focuses search
  document.addEventListener("keydown", function(ev){
    if(ev.key==="/" && document.activeElement!==qbox && /^(BODY|A|BUTTON)$/.test(document.activeElement.tagName)){
      ev.preventDefault(); qbox.focus();
    }
    if(ev.key==="Escape" && modal.classList.contains("open")) modal.classList.remove("open");
  });

  updateCounts();
})();
</script>
</body>
</html>
